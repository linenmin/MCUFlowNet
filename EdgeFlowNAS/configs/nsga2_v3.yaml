# EdgeFlowNAS NSGA-II + hybrid LLM agent config (V3)
# Phase 5 (search_hybrid_v1): supports --ablation_group {a,b,c,d} via wrapper.

search:
  total_evaluations: 800
  population_size: 50
  seed: 2026
  crossover_prob: 0.9
  mutation_prob: null
  duplicate_retry_factor: 20
  search_space_size: 23328
  search_space_module: "efnas.nas.search_space_v3"

# Phase 2-4: 5 LLM agent roles, 全部路由到 Gemini 3.1 Pro.
# (a) baseline 不读这一段; (b/c/d) 按需用对应 role.
llm:
  models:
    warmstart_agent:    "gemini/gemini-3.1-pro-preview"
    scientist_stage_a:  "gemini/gemini-3.1-pro-preview"
    scientist_stage_b1: "gemini/gemini-3.1-pro-preview"
    scientist_stage_b2: "gemini/gemini-3.1-pro-preview"
    supervisor_agent:   "gemini/gemini-3.1-pro-preview"
  # IMPORTANT: Gemini 3.1 系列在 LiteLLM 网关上**只接受 temperature=1.0**.
  # 任何其他值会被 LiteLLM 拒绝或被 Gemini 默默改写, 不要尝试调低.
  # 输出确定性靠 prompt + response_format=json_object 控制, 不靠温度.
  temperature:
    warmstart_agent:    1.0
    scientist_stage_a:  1.0
    scientist_stage_b1: 1.0
    scientist_stage_b2: 1.0
    supervisor_agent:   1.0
  max_tokens: 8192
  request_timeout: 180
  max_retries: 3

concurrency:
  max_workers: 6
  gpu_devices: "0,1,2,3,4,5"

evaluation:
  eval_script: "wrappers/run_supernet_subnet_distribution_v3.py"
  supernet_config: "configs/supernet_v3_fc2_172x224.yaml"
  # Prefer passing this from CLI:
  # --supernet_experiment_dir outputs/supernet/edgeflownas_supernet_v3_fc2_172x224_run1_archparallel
  supernet_experiment_dir: ""
  checkpoint_type: "best"
  enable_vela: true
  vela_mode: "verbose"
  vela_keep_artifacts: true
  vela_prune_tflite_after_reduce: true
  per_layer_csv_max_rows: 500
  bn_recal_batches: 32
  batch_size: 32
  eval_batches_per_arch: null
  max_fc2_val_samples: null
  num_workers: 2
  prefetch_batches: 2

paths:
  output_root: "outputs/nsga2_v3"

files:
  state_json: "nsga2_state.json"
  pareto_csv: "pareto_front.csv"
