# EdgeFlowNAS NSGA-II + hybrid LLM agent config (V4 + Anthropic adaptive thinking).
# 在 nsga2_v4.yaml 的基础上为 3 个"战略性" agent 启用 Anthropic Opus 4.7 adaptive
# thinking (xhigh effort, 即 Opus 4.7 独占的深度探索档).
#
# 增量 vs nsga2_v4.yaml:
#   - llm.reasoning_effort map 启用 3 个 role (warmstart/scientist_a/supervisor),
#     全部用 "xhigh" (Opus 4.7 独占的深度档, 介于 high 和 max 之间)
#   - request_timeout 240 -> 360 (adaptive thinking 单次调用可能变慢 2-5x)
#   - max_tokens 8192 -> 20000 (Opus 4.7 max_tokens 含 thinking+text 总量)
#
# 区分逻辑:
#   - 战略决策 (THINK xhigh): warmstart_agent / scientist_stage_a / supervisor_agent
#     -- 这三个都是 "决定做什么" 的 macro-level reasoning, thinking 收益高
#   - 机械产出 (NO THINK): scientist_stage_b1 / scientist_stage_b2
#     -- 写 Python 沙箱代码 / 写 markdown, 现代 LLM 不需深度推理即可正确执行
#
# Anthropic Opus 4.7 thinking 关键变化 (2026-04-16+):
#   - 老 schema (thinking={"type":"enabled", "budget_tokens":N}) 被服务端拒 400
#   - 新 schema: thinking={"type":"adaptive"} + output_config={"effort":...}
#   - 我们传 reasoning_effort, LiteLLM 自动翻译 (per Anthropic Effort docs)
#   - max_tokens 现在覆盖 thinking + response 总量 (不再有 budget_tokens 这个概念)
#
# 单次 d_v4_thinking run 成本估算 (xhigh effort 比 high 略贵):
#   - warmstart × 1 + scientist_a × 5 + supervisor × 5 = 11 个 thinking 调用
#   - 估计 ~150-250K thinking tokens × $25/M = ~$4-6
#   - 总成本: ~$8-21
#
# 需要环境变量: ANTHROPIC_API_KEY
# 需要 LiteLLM >= 1.83.3-stable.opus-4.7 (Opus 4.7 day-0 support)

search:
  total_evaluations: 800
  population_size: 50
  seed: 2026
  crossover_prob: 0.9
  mutation_prob: null
  duplicate_retry_factor: 20
  search_space_size: 23328
  search_space_module: "efnas.nas.search_space_v3"

llm:
  models:
    warmstart_agent:    "anthropic/claude-opus-4-7"
    scientist_stage_a:  "anthropic/claude-opus-4-7"
    scientist_stage_b1: "anthropic/claude-opus-4-7"
    scientist_stage_b2: "anthropic/claude-opus-4-7"
    supervisor_agent:   "anthropic/claude-opus-4-7"
  temperature:
    warmstart_agent:    1.0
    scientist_stage_a:  1.0
    scientist_stage_b1: 1.0
    scientist_stage_b2: 1.0
    supervisor_agent:   1.0
  # 关键: 仅为 3 个战略性 role 启用 thinking, 统一 xhigh effort.
  # scientist_stage_b1/b2 不在此 map 中 = thinking 关闭 (LiteLLM 不发 reasoning_effort).
  # 5 个 effort 等级: low / medium / high / xhigh / max (xhigh 是 Opus 4.7 独占).
  # LiteLLM 把 reasoning_effort 翻译成 Anthropic 的 thinking=adaptive + effort=xhigh.
  reasoning_effort:
    warmstart_agent:    "xhigh"
    scientist_stage_a:  "xhigh"
    supervisor_agent:   "xhigh"
  # Opus 4.7 max_tokens 现在含 thinking + text 总量. Anthropic 官方示例用 16000,
  # 我们留余量到 20000 防止 thinking 输出 token 触顶 (stop_reason=max_tokens).
  # 对非 thinking role (b1/b2) 也用 20000, 它们自然不会真生成这么多 token, 只是 cap.
  max_tokens: 20000
  request_timeout: 360   # thinking 模式下单次调用可能慢 2-5x; 留余量
  max_retries: 3

concurrency:
  max_workers: 6
  gpu_devices: "0,1,2,3,4,5"

evaluation:
  eval_script: "wrappers/run_supernet_subnet_distribution_v3.py"
  supernet_config: "configs/supernet_v3_fc2_172x224.yaml"
  supernet_experiment_dir: ""
  checkpoint_type: "best"
  enable_vela: true
  vela_mode: "verbose"
  vela_keep_artifacts: true
  vela_prune_tflite_after_reduce: true
  per_layer_csv_max_rows: 500
  bn_recal_batches: 32
  batch_size: 32
  eval_batches_per_arch: null
  max_fc2_val_samples: null
  num_workers: 2
  prefetch_batches: 2

paths:
  output_root: "outputs/search_hybrid_v2"

files:
  state_json: "nsga2_state.json"
  pareto_csv: "pareto_front.csv"
