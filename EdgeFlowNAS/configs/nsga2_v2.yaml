# EdgeFlowNAS NSGA-II baseline search config (V2)

search:
  total_evaluations: 800
  population_size: 50
  seed: 2026
  crossover_prob: 0.9
  mutation_prob: null
  duplicate_retry_factor: 20
  search_space_size: 23328

concurrency:
  max_workers: 4

evaluation:
  eval_script: "wrappers/run_supernet_subnet_distribution_v2.py"
  supernet_config: "configs/supernet_fc2_172x224_v2.yaml"
  checkpoint_type: "best"
  enable_vela: true
  vela_mode: "verbose"
  vela_keep_artifacts: true
  vela_prune_tflite_after_reduce: true
  per_layer_csv_max_rows: 500
  bn_recal_batches: 16
  batch_size: 32
  eval_batches_per_arch: null
  max_fc2_val_samples: null

paths:
  output_root: "outputs/nsga2_v2"

files:
  state_json: "nsga2_state.json"
  pareto_csv: "pareto_front.csv"
