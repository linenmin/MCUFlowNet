runtime:
  experiment_name: "ablation_v1_fc2"
  output_root: "outputs/ablation_v1_fc2"
  seed: 42

variants:
  - name: "edgeflownet_deconv"
    upsample_mode: "deconv"
    bottleneck_eca: false
    gate_4x: false
  - name: "edgeflownet_bilinear"
    upsample_mode: "bilinear"
    bottleneck_eca: false
    gate_4x: false
  - name: "edgeflownet_bilinear_eca"
    upsample_mode: "bilinear"
    bottleneck_eca: true
    gate_4x: false
  - name: "edgeflownet_bilinear_eca_gate4x"
    upsample_mode: "bilinear"
    bottleneck_eca: true
    gate_4x: true

train:
  gpu_device: 0
  num_epochs: 400
  batch_size: 32
  lr: 1.0e-4
  lr_min: 1.0e-6
  weight_decay: 0.0
  grad_clip_global_norm: 200.0
  train_sampling_mode: "shuffle_no_replacement"
  train_crop_mode: "random"
  early_stop_patience: 20
  early_stop_min_delta: 1.0e-4

data:
  dataset: "FC2"
  base_path: "../"
  train_dir: "Datasets/FlyingChairs2/train"
  val_dir: "Datasets/FlyingChairs2/val"
  input_height: 352
  input_width: 480
  flow_channels: 2
  fc2_num_workers: 16
  fc2_eval_num_workers: 16

eval:
  eval_every_epoch: 5
  eval_batches: 0
  sintel:
    dataset_root: "../Datasets/Sintel"
    sintel_list: "EdgeFlowNet/code/dataset_paths/MPI_Sintel_Final_train_list.txt"
    patch_size: "416,1024"
    ckpt_name: "sintel_best"
    max_samples: null

checkpoint:
  load_checkpoint: false
  resume_experiment_name: ""
  resume_ckpt_name: "last"
  init_mode: "none"
